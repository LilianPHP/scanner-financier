<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Gradient principal violet/indigo -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient accent teal -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow douce -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- Clip pour l'icône -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="140" height="140" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- === ICÔNE BADGE === -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Fond badge arrondi -->
    <rect x="0" y="0" width="140" height="140" rx="36" ry="36" fill="url(#iconGrad)"/>

    <!-- Barre de graphique subtile en fond (décoration) -->
    <g opacity="0.12" clip-path="url(#iconClip)">
      <rect x="18" y="90" width="18" height="50" rx="4" fill="white"/>
      <rect x="44" y="68" width="18" height="72" rx="4" fill="white"/>
      <rect x="70" y="50" width="18" height="90" rx="4" fill="white"/>
      <rect x="96" y="30" width="18" height="110" rx="4" fill="white"/>
      <rect x="122" y="15" width="18" height="125" rx="4" fill="white"/>
    </g>

    <!-- Lettre "S" stylisée en blanc -->
    <!-- S construit avec des courbes de Bézier élégantes -->
    <path d="
      M 83,38
      C 83,38 76,30 62,30
      C 46,30 36,40 36,53
      C 36,66 46,73 62,76
      C 75,79 84,84 84,96
      C 84,108 74,116 60,116
      C 46,116 36,108 36,108
    "
    stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Point accent teal (élément dynamique) -->
    <circle cx="100" cy="45" r="8" fill="url(#accentGrad)" opacity="0.9"/>
    <circle cx="38" cy="100" r="5.5" fill="url(#accentGrad)" opacity="0.75"/>
  </g>

  <!-- === WORDMARK "senzio" === -->
  <g transform="translate(172, 0)">
    <!-- Texte principal -->
    <text
      x="0" y="103"
      font-family="'Nano Banana Pro', 'Montserrat', 'Nunito', 'Inter', sans-serif"
      font-weight="700"
      font-size="72"
      letter-spacing="-2"
      fill="#1E1B4B">senzio</text>

    <!-- Ligne décorative accent sous "senzio" -->
    <rect x="2" y="114" width="270" height="4" rx="2" fill="url(#accentGrad)"/>

    <!-- Tagline -->
    <text
      x="3" y="142"
      font-family="'Nano Banana Pro', 'Montserrat', 'Nunito', 'Inter', sans-serif"
      font-weight="400"
      font-size="17"
      letter-spacing="4"
      fill="#6D28D9"
      opacity="0.75">ANALYSE DE BUDGET</text>
  </g>
</svg>
